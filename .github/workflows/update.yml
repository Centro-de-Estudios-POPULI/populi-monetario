name: Actualizar datos monetarios BCB

on:
  schedule:
    - cron: '0 14 3,5,7,10,16,18,20 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: Ejecutar scrapers
        run: |
          echo "═══ Scraper Sector Monetario BCB ═══"
          python scraper/scrape_emision.py
          python scraper/scrape_agregados.py
          python scraper/scrape_rin.py
          python scraper/scrape_monetizacion.py
          python scraper/scrape_balance.py
          echo "═══ Todos los scrapers completados ═══"

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "data: actualización automática sector monetario $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=populi-monetario
